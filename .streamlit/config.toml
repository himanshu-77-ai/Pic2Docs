[server]
port = 8501
address = "0.0.0.0"
maxUploadSize = 10
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#6C63FF"
backgroundColor = "#0F0F1A"
secondaryBackgroundColor = "#1A1A2E"
textColor = "#E8E8F0"
font = "sans serif"

[runner]
fastReruns = true

[logger]
level = "info"
